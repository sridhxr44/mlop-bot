name: MLOps Pipeline

on:
  push:
    branches: [main]

jobs:
  build-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Train model
      run: python train.py

    - name: Retrain model
      run: python retrain.py

    - name: Test API import
      run: python -c "import api"
